{% extends "base.html" %}

{% block content %}
<section class="min-h-screen flex items-center justify-center py-20">
    <div class="max-w-4xl w-full mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-10">
            <h1 class="text-3xl md:text-5xl font-bold mb-4">Website Analysis</h1>
            <p class="text-gray-400">Enter a URL below to get a detailed security and performance report.</p>
        </div>

        <div class="glass-card p-8 md:p-12 rounded-2xl" data-aos="zoom-in">
            <form id="analyze-form" class="max-w-2xl mx-auto relative">
                <div class="flex flex-col md:flex-row gap-4">
                    <input type="text" id="url-input" name="url" placeholder="Enter website URL (e.g., google.com)"
                        class="flex-1 px-6 py-4 rounded-lg bg-black/40 border border-white/10 focus:border-cyber-blue focus:ring-1 focus:ring-cyber-blue outline-none text-white transition-all">
                    <button type="submit"
                        class="px-8 py-4 bg-cyber-blue hover:bg-cyber-blue/90 text-black font-bold rounded-lg transition-all hover:shadow-[0_0_20px_rgba(0,242,255,0.4)] flex items-center justify-center min-w-[160px]">
                        <span id="btn-text">Analyze</span>
                        <div id="btn-loader"
                            class="hidden w-5 h-5 border-2 border-black border-t-transparent rounded-full animate-spin ml-2">
                        </div>
                    </button>
                </div>
                <p id="error-msg" class="text-red-500 mt-4 text-sm hidden"></p>
            </form>

            <!-- Results Container -->
            <div id="results-container" class="mt-12 hidden text-left transition-all duration-500">
                <!-- Results inserted by JS -->
            </div>
        </div>
    </div>
</section>
{% endblock %}
